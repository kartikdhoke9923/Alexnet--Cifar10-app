<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexNet CIFAR-10 Classifier</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 40px 36px;
            max-width: 480px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 1.6rem;
            color: #1a237e;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.92rem;
            margin-bottom: 28px;
        }

        /* Model status badge */
        #model-status {
            text-align: center;
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 20px;
            display: inline-block;
            margin: 0 auto 20px;
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
            width: 100%;
        }
        #model-status.ready {
            background: #e8f5e9;
            color: #2e7d32;
            border-color: #a5d6a7;
        }

        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .file-label {
            display: inline-block;
            background: #1976d2;
            color: #fff;
            padding: 11px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.97rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .file-label:hover { background: #1565c0; }

        input[type="file"] { display: none; }

        .preview-container {
            width: 100%;
            min-height: 180px;
            border: 2px dashed #bbdefb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f9ff;
            overflow: hidden;
        }

        .preview-container .placeholder-text {
            color: #90a4ae;
            font-size: 0.88rem;
        }

        #preview {
            max-width: 100%;
            max-height: 260px;
            border-radius: 8px;
            display: none;
            object-fit: contain;
        }

        #predictBtn {
            width: 100%;
            padding: 13px;
            background: #43a047;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            letter-spacing: 0.03em;
        }
        #predictBtn:hover:not(:disabled) { background: #388e3c; }
        #predictBtn:disabled {
            background: #b0bec5;
            cursor: not-allowed;
        }

        /* Results */
        #results { margin-top: 24px; }

        .result-title {
            font-size: 0.82rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .prediction {
            background: #f8faff;
            border: 1px solid #e3eaf5;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .prediction.top {
            background: #e8f5e9;
            border-color: #a5d6a7;
        }

        .pred-rank {
            font-weight: 700;
            color: #90a4ae;
            font-size: 0.9rem;
            min-width: 22px;
        }
        .prediction.top .pred-rank { color: #2e7d32; }

        .pred-info { flex: 1; }

        .pred-class {
            font-weight: 700;
            font-size: 1rem;
            color: #1a237e;
            text-transform: capitalize;
        }
        .prediction.top .pred-class { color: #1b5e20; }

        .pred-bar-wrap {
            margin-top: 5px;
            background: #e0e0e0;
            border-radius: 4px;
            height: 7px;
            overflow: hidden;
        }

        .pred-bar {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #1976d2, #42a5f5);
            transition: width 0.7s ease;
        }
        .prediction.top .pred-bar {
            background: linear-gradient(90deg, #2e7d32, #66bb6a);
        }

        .pred-conf {
            font-size: 1rem;
            font-weight: 700;
            color: #1976d2;
            min-width: 52px;
            text-align: right;
        }
        .prediction.top .pred-conf { color: #2e7d32; }

        .error-msg {
            color: #c62828;
            background: #ffebee;
            border: 1px solid #ef9a9a;
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 0.93rem;
        }

        /* hidden canvas for preprocessing */
        #preprocess-canvas { display: none; }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- Hidden 32×32 canvas — used only for preprocessing -->
<canvas id="preprocess-canvas" width="32" height="32"></canvas>

<div class="container">
    <h1>AlexNet CIFAR-10 Classifier</h1>
    <p class="subtitle">Upload an image (airplane, car, cat, etc.)</p>

    <div id="model-status">Loading model, please wait...</div>

    <div class="upload-area">
        <label for="imageInput" class="file-label">
            Choose Image (JPG / PNG)
        </label>
        <input type="file" id="imageInput" accept="image/*">

        <div class="preview-container" id="preview-container">
            <span class="placeholder-text">Image preview will appear here</span>
            <img id="preview" alt="Image Preview">
        </div>

        <button id="predictBtn" disabled>Preview Image</button>
    </div>

    <div id="results"></div>
</div>

<script>
// ── CIFAR-10 class names — same order as your Flask app ──
const CIFAR_CLASSES = [
    'airplane', 'automobile', 'bird', 'cat', 'deer',
    'dog', 'frog', 'horse', 'ship', 'truck'
];

const EMOJIS = ['✈️','🚗','🐦','🐱','🦌','🐶','🐸','🐴','🚢','🚛'];

const MODEL_PATH = './tfjs_model/model.json'; // same folder as index.html

let model      = null;
let fileLoaded = false;

const imageInput      = document.getElementById('imageInput');
const previewImg      = document.getElementById('preview');
const previewBox      = document.getElementById('preview-container');
const predictBtn      = document.getElementById('predictBtn');
const resultsDiv      = document.getElementById('results');
const modelStatus     = document.getElementById('model-status');
const canvas          = document.getElementById('preprocess-canvas');
const ctx             = canvas.getContext('2d');

// ══════════════════════════════════════════
//  PREPROCESSING — mirrors your Flask app:
//    img.resize((32, 32))
//    img_array / 255.0
//    np.expand_dims(..., axis=0)
//
//  Extra: center-crop before resize so
//  non-square photos don't get stretched
// ══════════════════════════════════════════
function preprocessImage(imgEl) {
    const sw = imgEl.naturalWidth;
    const sh = imgEl.naturalHeight;

    // Center-square crop (like CIFAR-10 images naturally are)
    const side = Math.min(sw, sh);
    const sx   = Math.floor((sw - side) / 2);
    const sy   = Math.floor((sh - side) / 2);

    // Draw onto hidden 32×32 canvas — equivalent to img.resize((32,32))
    ctx.clearRect(0, 0, 32, 32);
    ctx.drawImage(imgEl, sx, sy, side, side, 0, 0, 32, 32);

    // Read raw RGBA pixels
    const px = ctx.getImageData(0, 0, 32, 32).data;

    // Convert to Float32, drop alpha, normalise /255  ← same as your Flask code
    const floats = new Float32Array(32 * 32 * 3);
    let j = 0;
    for (let i = 0; i < px.length; i += 4) {
        floats[j++] = px[i]     / 255.0; // R
        floats[j++] = px[i + 1] / 255.0; // G
        floats[j++] = px[i + 2] / 255.0; // B
    }

    // np.expand_dims(img_array, axis=0) → shape [1, 32, 32, 3]
    return tf.tensor4d(floats, [1, 32, 32, 3]);
}

// ── Load TF.js model (replaces Flask model loading) ──
async function loadModel() {
    try {
        model = await tf.loadLayersModel(MODEL_PATH);

        // Warm-up pass
        const dummy = tf.zeros([1, 32, 32, 3]);
        model.predict(dummy).dispose();
        dummy.dispose();

        modelStatus.textContent = 'Model ready — accuracy ~92% on CIFAR-10';
        modelStatus.classList.add('ready');
        if (fileLoaded) predictBtn.disabled = false;
    } catch (e) {
        modelStatus.textContent = 'Model failed to load. Run: python -m http.server 8000';
        console.error(e);
    }
}

// ── File selection — same as your JS reader.onload ──
imageInput.addEventListener('change', function(e) {
    console.log("File selected!");
    const file = e.target.files[0];
    if (!file) return;

    console.log("File details:", file.name, file.size, file.type);

    const reader = new FileReader();
    reader.onload = function(e) {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
        previewBox.querySelector('.placeholder-text') &&
            (previewBox.querySelector('.placeholder-text').style.display = 'none');

        fileLoaded = true;
        if (model) predictBtn.disabled = false;
        predictBtn.innerHTML = 'Predict';
        resultsDiv.innerHTML = '';
        console.log("Preview shown!");
    };
    reader.readAsDataURL(file);
});

// ── Predict button — replaces your fetch('/predict') call ──
predictBtn.addEventListener('click', async function() {
    if (!fileLoaded || !model) {
        alert('Please select an image first!');
        return;
    }

    console.log("Running inference in browser...");
    predictBtn.disabled = true;
    predictBtn.innerHTML = '<span class="spinner"></span>Predicting...';
    resultsDiv.innerHTML = '';

    await new Promise(r => setTimeout(r, 30)); // let browser repaint

    try {
        // Preprocess — same as your Flask PIL code
        const tensor = preprocessImage(previewImg);

        // model.predict — same as your model.predict(img_array)[0]
        const predTensor = model.predict(tensor);
        const predictions = Array.from(await predTensor.data());
        tensor.dispose();
        predTensor.dispose();

        console.log("Response:", predictions);

        // Build top-5 results — same as your Flask top_indices logic
        const indexed = predictions
            .map((conf, idx) => ({ rank: 0, class: CIFAR_CLASSES[idx], confidence: conf, idx }))
            .sort((a, b) => b.confidence - a.confidence)
            .slice(0, 5)
            .map((p, i) => ({ ...p, rank: i + 1, confidence_percent: (p.confidence * 100).toFixed(1) }));

        // Render results — same structure as your Flask response
        resultsDiv.innerHTML = `<div class="result-title">Top 5 Predictions</div>` +
            indexed.map((p, i) => `
                <div class="prediction ${i === 0 ? 'top' : ''}">
                    <div class="pred-rank">${p.rank}.</div>
                    <div class="pred-info">
                        <div class="pred-class">${EMOJIS[CIFAR_CLASSES.indexOf(p.class)]} ${p.class}</div>
                        <div class="pred-bar-wrap">
                            <div class="pred-bar" style="width:0%" data-w="${p.confidence_percent}"></div>
                        </div>
                    </div>
                    <div class="pred-conf">${p.confidence_percent}%</div>
                </div>`
            ).join('');

        // Animate bars after render
        requestAnimationFrame(() => {
            document.querySelectorAll('.pred-bar').forEach(bar => {
                bar.style.width = bar.dataset.w + '%';
            });
        });

    } catch (error) {
        console.error('Error:', error);
        resultsDiv.innerHTML = `<div class="error-msg">Prediction failed: ${error.message}</div>`;
    }

    predictBtn.disabled = false;
    predictBtn.innerHTML = 'Predict';
});

// ── Boot ──
loadModel();
</script>
</body>
</html>
